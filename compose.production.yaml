services:
  nginx:
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/${ROOT_DOMAIN}:/etc/letsencrypt/live/${ROOT_DOMAIN}:ro
      - /etc/letsencrypt/archive/${ROOT_DOMAIN}:/etc/letsencrypt/archive/${ROOT_DOMAIN}:ro
      - /etc/letsencrypt/live/internal.${ROOT_DOMAIN}:/etc/letsencrypt/live/internal.${ROOT_DOMAIN}:ro
      - /etc/letsencrypt/archive/internal.${ROOT_DOMAIN}:/etc/letsencrypt/archive/internal.${ROOT_DOMAIN}:ro
  registry:
    volumes:
      - /etc/letsencrypt/live/${ROOT_DOMAIN}:/etc/letsencrypt/live/${ROOT_DOMAIN}:ro
      - /etc/letsencrypt/archive/${ROOT_DOMAIN}:/etc/letsencrypt/archive/${ROOT_DOMAIN}:ro