networks:
  shared_infra_net:
    driver: bridge
  infra_services:
    driver: bridge
  shared_infra_database: 
    driver: bridge

volumes:
  registry-data:
    driver: local
  database-data:
    driver: local
  
services:
  ##################################################################
  # Shared Cloudflare/nginx
  ##################################################################
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: infra-cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    networks:
      - shared_infra_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-cloudflared"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "1"
          memory: 64M
    restart: always
  nginx:
    image: nginx:alpine
    container_name: infra-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certs:/etc/letsencrypt/live/bonnybonnybonaktan.xyz:ro
      - ./infra/certs:/etc/letsencrypt/archive/bonnybonnybonaktan.xyz:ro
      - ./infra/certs:/etc/letsencrypt/live/internal.bonnybonnybonaktan.xyz:ro
      - ./infra/certs:/etc/letsencrypt/archive/internal.bonnybonnybonaktan.xyz:ro
    networks:
      - shared_infra_net
      - infra_services_net
    extra_hosts:
      - "host.docker.internal:172.16.0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-nginx"
    depends_on:
      - registry
      - registry-ui
      - cloudflared
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "1"
          memory: 64M
    restart: always
  
  ##################################################################
  # Shared Database
  ##################################################################
  database:
    image: postgres:18-alpine
    container_name: infra-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - shared_infra_database
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-database"
    restart: always
  
  database_migration:
    image: flyway/flyway:10
    container_name: infra-database_migration
    command: migrate
    volumes:
      - ./imfra/migration/sql:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - shared_infra_database
  
  ##################################################################
  # Home Networking
  ##################################################################
  pihole:
    container_name: infra-pihole
    image: pihole/pihole:latest
    # ports:
    #   - "53:53/tcp"
    #   - "53:53/udp"
    #   - "67:67/udp"
    #   - "123:123/udp"
    # expose:
    #   - "80"
    environment:
      TZ: 'Asia/Manila'
      FTLCONF_webserver_api_password: 'putanginanyo@As1'
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - './infra/pihole:/etc/pihole:rw'
    network_mode: 'host'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M

  ##################################################################
  # Docker Image Registry
  ##################################################################
  registry:
    image: registry:2
    container_name: infra-registry
    restart: always
    expose:
      - "5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Docker Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_LOG_LEVEL: info
      REGISTRY_LOG_FORMATTER: json
      REGISTRY_HEALTH_STORAGEDRIVER_ENABLED: "true"
      REGISTRY_HEALTH_STORAGEDRIVER_INTERVAL: 10s
      REGISTRY_HEALTH_STORAGEDRIVER_THRESHOLD: 3
    volumes:
      - registry-data:/var/lib/registry
      - ./infra/registry/auth:/auth:ro
      - ./infra/registry/config.yml:/etc/docker/registry/config.yml:ro
    networks:
      - infra_services_net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 32M

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: infra-registry_ui
    restart: always
    expose:
      - "80"
    environment:
      REGISTRY_TITLE: "bonnybonnybonaktan.xyz Registry"
      REGISTRY_URL: https://registry.bonnybonnybonaktan.xyz
      SINGLE_REGISTRY: "true"
      DELETE_IMAGES: "true"
      NGINX_PROXY_PASS_URL: http://registry:5000
    depends_on:
      - registry
    networks:
      - infra_services_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.25"
          memory: 32M