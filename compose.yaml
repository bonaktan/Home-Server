networks:
  shared_infra_net:
    driver: bridge
  infra_services:
    driver: bridge
  shared_infra_database: 
    driver: bridge

volumes:
  registry-data:
    driver: local
  database-data:
    driver: local
  observ-grafana-data:
    driver: local


services:
  ##################################################################
  # Shared Cloudflare/nginx
  ##################################################################
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: infra-cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    networks:
      - shared_infra_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-cloudflared"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "1"
          memory: 64M
    restart: always
  nginx:
    image: nginx:alpine
    container_name: infra-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certs:/etc/letsencrypt/live/bonnybonnybonaktan.xyz:ro
      - ./infra/certs:/etc/letsencrypt/archive/bonnybonnybonaktan.xyz:ro
      - ./infra/certs:/etc/letsencrypt/live/internal.bonnybonnybonaktan.xyz:ro
      - ./infra/certs:/etc/letsencrypt/archive/internal.bonnybonnybonaktan.xyz:ro
    networks:
      - shared_infra_net
    extra_hosts:
      - "host.docker.internal:172.16.0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-nginx"
    depends_on:
      - cloudflared
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "1"
          memory: 64M
    restart: always
  
  ##################################################################
  # Shared Database
  ##################################################################
  database:
    image: postgres:18-alpine
    container_name: infra-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - shared_infra_database
    volumes:
      - database-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-database"
    restart: always

  database_pgadmin:
    image: dpage/pgadmin4
    container_name: infra-database_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - shared_infra_net
      - shared_infra_database
    depends_on:
      database:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=infra-database_pgadmin"
        
  database_migration:
    image: flyway/flyway:10
    container_name: infra-database_migration
    command: migrate
    volumes:
      - ./infra/migration/sql:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_MIXED: "true"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - shared_infra_database
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
  
  ##################################################################
  # Home Networking
  ##################################################################
  pihole:
    container_name: infra-pihole
    image: pihole/pihole:latest
    # ports:
    #   - "53:53/tcp"
    #   - "53:53/udp"
    #   - "67:67/udp"
    #   - "123:123/udp"
    # expose:
    #   - "80"
    environment:
      TZ: 'Asia/Manila'
      FTLCONF_webserver_api_password: 'putanginanyo@As1'
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - './infra/pihole:/etc/pihole:rw'
    network_mode: 'host'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M

  ##################################################################
  # Docker Image Registry
  ##################################################################
  registry:
    image: registry:2
    container_name: infra-registry
    restart: always
    expose:
      - "5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Docker Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_LOG_LEVEL: info
      REGISTRY_LOG_FORMATTER: json
      REGISTRY_HEALTH_STORAGEDRIVER_ENABLED: "true"
      REGISTRY_HEALTH_STORAGEDRIVER_INTERVAL: 10s
      REGISTRY_HEALTH_STORAGEDRIVER_THRESHOLD: 3
    volumes:
      - registry-data:/var/lib/registry
      - ./infra/registry/auth:/auth:ro
      - ./infra/registry/config.yml:/etc/docker/registry/config.yml:ro
    networks:
      - infra_services
      - shared_infra_net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 32M

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: infra-registry_ui
    restart: always
    expose:
      - "80"
    environment:
      REGISTRY_TITLE: "bonnybonnybonaktan.xyz Registry"
      REGISTRY_URL: https://registry.bonnybonnybonaktan.xyz
      SINGLE_REGISTRY: "true"
      DELETE_IMAGES: "true"
      NGINX_PROXY_PASS_URL: http://registry:5000
    depends_on:
      - registry
    networks:
      - infra_services
      - shared_infra_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.25"
          memory: 32M

  ##################################################################
  # Observability Stack
  ##################################################################
  prometheus:
    image: prom/prometheus:latest
    container_name: infra-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - "9090"
    networks:
      - infra_services
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 64M

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: infra-node_exporter
    command:
      - '--path.rootfs=/host'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: host
    pid: host
    restart: always
    volumes:
      - /:/host:ro,rslave

  loki:
    image: grafana/loki:latest
    container_name: infra-loki
    expose:
      - "3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - infra_services
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 64M

  promtail:
    image: grafana/promtail:latest
    container_name: infra-promtail
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - infra_services
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 32M

  grafana:
    image: grafana/grafana:latest
    container_name: infra-grafana
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - observ-grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - infra_services
      - shared_infra_net
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M