server {
    include                     conf.d/filters/scanblock.conf; 

    listen                      443 ssl;
    server_name                 registry.bonnybonnybonaktan.xyz;

    ssl_certificate             /etc/letsencrypt/live/bonnybonnybonaktan.xyz/fullchain.pem;
    ssl_certificate_key         /etc/letsencrypt/live/bonnybonnybonaktan.xyz/privkey.pem;
    
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location / {
        limit_req               zone=general_limit burst=20 nodelay;
        set $upstream           http://registry-ui:80;

        proxy_connect_timeout   2s;
        proxy_read_timeout      5s;
        proxy_no_cache          1;
        proxy_cache_bypass      1;
        proxy_cache             off;
        proxy_pass              $upstream;

        error_page 502 503 504 = @proxy_down;
    }

    location /v2/ {
        limit_req               zone=general_limit burst=20 nodelay;
        set $upstream           http://registry:5000;

        client_max_body_size    1G;
        proxy_connect_timeout   2s;
        proxy_read_timeout      5s;
        proxy_no_cache          1;
        proxy_cache_bypass      1;
        proxy_cache             off;
        proxy_pass              $upstream;

        error_page 502 503 504 = @proxy_down;
    }
    location /favicon.ico {
        return                  204;
        access_log              off;
        log_not_found           off;
    }
    location @proxy_down {
        return 503 "Service temporarily unavailable";
    }
}
