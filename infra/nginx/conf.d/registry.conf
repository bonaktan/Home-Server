server {
    include                     conf.d/filters/scanblock.conf; 

    listen                      443 ssl;
    server_name                 registry.bonnybonnybonaktan.xyz;

    ssl_certificate             /etc/letsencrypt/live/bonnybonnybonaktan.xyz/fullchain.pem;
    ssl_certificate_key         /etc/letsencrypt/live/bonnybonnybonaktan.xyz/privkey.pem;
    
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location / {
        limit_req               zone=general_limit burst=20 nodelay;
        proxy_no_cache          1;
        proxy_cache_bypass      1;
        proxy_cache             off;
        proxy_pass              http://registry-ui:80;
    }

    location /v2/ {
        limit_req               zone=api_limit burst=10 nodelay;
        client_max_body_size    1G;
        proxy_no_cache          1;
        proxy_cache_bypass      1;
        proxy_cache             off;
        proxy_pass              http://registry:5000;
    }

    location /favicon.ico {
        return                  204;
        access_log              off;
        log_not_found           off;
    }
}
