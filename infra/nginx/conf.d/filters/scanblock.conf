# Block dotfiles except .well-known (catches .env, .git, .aws, .htaccess, etc.)
location ~ /\.(?!well-known) {
    deny all;
    return 444;
}

# Blocking specific sensitive filenames
location ~* /(docker-compose\.ya?ml|package(-lock)?\.json|composer\.json|composer\.lock|vercel\.json|\.ya?ml|id_rsa|id_ed25519|.*\.pem|.*\.key|credentials\.json)$ {
    return 444;
}