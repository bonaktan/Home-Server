server {
    include                     conf.d/filters/scanblock.conf; 

    listen                      80;
    listen                      443 ssl;
    server_name                 pihole.internal.bonnybonnybonaktan.xyz;

    ssl_certificate             /etc/letsencrypt/live/internal.bonnybonnybonaktan.xyz/fullchain.pem;
    ssl_certificate_key         /etc/letsencrypt/live/internal.bonnybonnybonaktan.xyz/privkey.pem;
    
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    resolver 127.0.0.11 valid=10s;  # or your DNS resolver (e.g. 8.8.8.8)

    location / {
        limit_req               zone=general_limit burst=20 nodelay;
        set $upstream           http://host.docker.internal:8080;

        proxy_connect_timeout   2s;
        proxy_read_timeout      5s;
        proxy_no_cache          1;
        proxy_cache_bypass      1;
        proxy_cache             off;
        proxy_pass              $upstream

        error_page 502 503 504 = @proxy_down;
    }

    location @proxy_down {
        return 503 "Service temporarily unavailable";
    }
}
