global:
  scrape_interval: 60s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Add your own services here, e.g.:
  # - job_name: 'my-app'
  #   static_configs:
  #     - targets: ['my-app:8080']