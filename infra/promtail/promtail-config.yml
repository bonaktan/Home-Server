server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 60s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
    pipeline_stages:
      - match:
          selector: '{container=~"cloudflared.*"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\S+)\s+(?P<level>INF|ERR|WRN|DBG|FTL)\s+(?P<message>.*)$'
            - template:
                source: level
                template: '{{ if eq .Value "INF" }}info{{ else if eq .Value "ERR" }}error{{ else if eq .Value "WRN" }}warn{{ else if eq .Value "DBG" }}debug{{ else if eq .Value "FTL" }}critical{{ else }}unknown{{ end }}'
            - labels:
                level: